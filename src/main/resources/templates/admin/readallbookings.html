<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking Records</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 40px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #e6f2ff;
        }

        tfoot {
            background-color: #ecf0f1;
            font-weight: bold;
        }

        .center {
        	text-align: center;
        }
        
    </style>
</head>
<body>

<h2>Booking Details</h2>
<a href="dashboard">ADMIN HOME</a><br>
	
	<h2 th:text="${message}"></h2>


<table>
    <thead>
        <tr>
        	<th>Id</th>
            <th>Name</th>
            <th>Email</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Date</th>
            <th>Time</th>
            <th>Comfort</th>
            <th>Adults</th>
            <th>Children</th>
            <th>Message</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each=" booking : ${allBookings}">
        	<td th:text="${booking.id}"></td>
            <td th:text="${booking.name}"></td>
            <td th:text="${booking.email}"></td>
            <td th:text="${booking.source}"></td>
            <td th:text="${booking.destination}"></td>
            <td th:text="${booking.date}"></td>
            <td th:text="${booking.time}"></td>
            <td th:text="${booking.comfort}"></td>
            <td th:text="${booking.adult}"></td>
            <td th:text="${booking.children}"></td>
            <td th:text="${booking.message}"></td>
            <td>
            	<a th:href="@{/admin/deleteBooking/{id} (id=${booking.id}) }">DELETE</a> 
            </td>
        </tr>

        
    </tbody>

</table>

</body>
</html>
