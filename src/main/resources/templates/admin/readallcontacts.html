<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 40px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #e6f2ff;
        }

        tfoot {
            background-color: #ecf0f1;
            font-weight: bold;
        }

        .center {
        	text-align: center;
        }
        
    </style>

</head>
<body>
	<h1>READ ALL CONTACTS SECTION</h1>
	<a href="dashboard">ADMIN HOME</a><br>
	
	<h2 th:text="${message}"></h2>

	<table border="1">
		<thead>
			<tr>
				<th>ID</th>
				<th>NAME</th>
				<th>EMAIL</th>
				<th>MESSAGE</th>
				<th>PHONE</th>
				<th>ACTION</th>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each=" contact : ${allcontacts}">
				<td style="padding: 10px;" th:text="${contact.id}"></td>
				<td th:text="${contact.name}"></td>
				<td th:text="${contact.email}"></td>
				<td th:text="${contact.message}"></td>
				<td th:text="${contact.phone}"></td>
				<td> 
					<a th:href="@{/admin/deleteContact/{id} (id=${contact.id}) }">DELETE</a>
				</td>

			</tr>
		</tbody>
	
	</table>

</body>
</html>
